name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'k8s/**'
      - 'docs/**'
      - '**/*.md'

jobs:

  # ─────────────────────────────────────────────
  # Job 1: Build + Push Backend (runs in parallel with frontend)
  # ─────────────────────────────────────────────
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-backend:latest', secrets.DOCKERHUB_USERNAME) || 'skillpulse-backend:latest' }}
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-backend:{1}', secrets.DOCKERHUB_USERNAME, github.sha) || format('skillpulse-backend:{0}', github.sha) }}
          # GHA cache: warm hits skip layer rebuilds entirely
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

  # ─────────────────────────────────────────────
  # Job 2: Build + Push Frontend (parallel with backend)
  # ─────────────────────────────────────────────
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: ${{ vars.DEPLOY_ENABLED == 'true' }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ vars.DEPLOY_ENABLED == 'true' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-frontend:latest', secrets.DOCKERHUB_USERNAME) || 'skillpulse-frontend:latest' }}
            ${{ secrets.DOCKERHUB_USERNAME != '' && format('{0}/skillpulse-frontend:{1}', secrets.DOCKERHUB_USERNAME, github.sha) || format('skillpulse-frontend:{0}', github.sha) }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

  # ─────────────────────────────────────────────
  # Job 3: Security Scan (runs after both builds)
  # Trivy: image + k8s manifest + filesystem scans
  # Gitleaks: secret detection
  # ─────────────────────────────────────────────
  security-scan:
    name: DevSecOps Security Scan
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    # run scan even in dry-run mode (images built locally, not pushed)
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build images locally for scanning (no push needed)
      - name: Build backend image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          load: true
          tags: skillpulse-backend:scan
          cache-from: type=gha,scope=backend

      - name: Build frontend image for scanning
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          load: true
          tags: skillpulse-frontend:scan
          cache-from: type=gha,scope=frontend

      # Trivy: backend image
      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: skillpulse-backend:scan
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0          # warn, don't fail pipeline on image vulns
        continue-on-error: true

      # Trivy: frontend image
      - name: Scan frontend image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: skillpulse-frontend:scan
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0
        continue-on-error: true

      # Trivy: Kubernetes manifests
      - name: Scan k8s manifests (Trivy config)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: k8s/
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0
        continue-on-error: true

      # Trivy: filesystem / dependency scan
      - name: Scan filesystem (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0
        continue-on-error: true

      # Gitleaks: secret detection
      - name: Scan for secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      # Upload all reports as CI artifacts (visible in Actions tab)
      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports-${{ github.sha }}
          path: security-reports/
          retention-days: 30

  # ─────────────────────────────────────────────
  # Job 4: Deploy Summary (final job, prints timing)
  # ─────────────────────────────────────────────
  summary:
    name: Deploy Summary
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend, security-scan]
    if: always()
    steps:
      - name: Print pipeline summary
        run: |
          echo "========================================="
          echo "  SkillPulse CI Pipeline Summary"
          echo "========================================="
          echo "  Commit SHA : ${{ github.sha }}"
          echo "  Branch     : ${{ github.ref_name }}"
          echo "  Triggered  : ${{ github.event_name }}"
          echo "  Actor      : ${{ github.actor }}"
          echo "  Timestamp  : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "  Backend image  : ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-backend:${{ github.sha }}"
          echo "  Frontend image : ${{ secrets.DOCKERHUB_USERNAME }}/skillpulse-frontend:${{ github.sha }}"
          echo ""
          echo "  build-backend  : ${{ needs.build-backend.result }}"
          echo "  build-frontend : ${{ needs.build-frontend.result }}"
          echo "  security-scan  : ${{ needs.security-scan.result }}"
          echo "========================================="